<!-- ═══ INÍCIO: my-agent/marketplace-specialist/static/favicon.svg ═══ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RocketAds">
  <defs>
    <linearGradient id="bg" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3b3b"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>

    <!-- leve suavização -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- fundo rounded -->
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#bg)"/>

  <!-- foguete -->
  <g transform="translate(32 32) rotate(-25) translate(-32 -32)" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#soft)">

    <!-- corpo (cápsula) -->
    <path d="M32 14
             C26.5 17.5 24 24.5 24 31
             C24 38.5 27.5 46 32 50
             C36.5 46 40 38.5 40 31
             C40 24.5 37.5 17.5 32 14Z"/>

    <!-- janela -->
    <circle cx="32" cy="28" r="4.2"/>

    <!-- detalhe central (linha do corpo) -->
    <path d="M32 33 L32 44"/>

    <!-- aletas laterais (mais “foguete”, menos “peixe”) -->
    <path d="M24 34
             C20.5 34.5 18.5 36.5 17.2 39.2
             C20.2 40 22.6 40.1 25.2 39.3" />
    <path d="M40 34
             C43.5 34.5 45.5 36.5 46.8 39.2
             C43.8 40 41.4 40.1 38.8 39.3" />

    <!-- base + chama -->
    <path d="M28.5 47.2 Q32 49.5 35.5 47.2"/>
    <path d="M32 49.5
             C30.2 51.2 30.2 54 32 55.8
             C33.8 54 33.8 51.2 32 49.5Z"/>

    <!-- “bico” mais definido -->
    <path d="M28.2 17.6 Q32 13.6 35.8 17.6"/>
  </g>
</svg>
<!-- ═══ FIM: my-agent/marketplace-specialist/static/favicon.svg ═══ -->