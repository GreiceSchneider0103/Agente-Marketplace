<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RocketAds — Login</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="rocket-badge" aria-hidden="true">
          <!-- Rocket icon -->
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M14.8 4.2c2.8.2 4.8 1.2 5 4.1.1 2.2-.7 5-3.4 7.7l-2.2 2.2c-.5.5-1.3.5-1.8 0l-6.3-6.3c-.5-.5-.5-1.3 0-1.8l2.2-2.2C10.8 5 12.6 4 14.8 4.2Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6.9 13.6 4.5 16c-.8.8-.9 2.1-.2 3l.7.8c.9.9 2.2.8 3 0l2.4-2.4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M14 7.8a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Z" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="auth-title">
          <h1>RocketAds</h1>
          <p>Agente Gerador de Anúncios</p>
        </div>
      </div>

      <form class="auth-form" method="post" action="/login">
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" placeholder="seu@email.com" required />
        </label>

        <label class="field">
          <span>Senha</span>
          <input name="password" type="password" placeholder="••••••••" required />
        </label>

        <button class="btn btn-primary btn-lg" type="submit">Entrar</button>

        {% if error %}
          <div class="alert alert-error" role="alert">{{ error }}</div>
        {% endif %}
      </form>
    </div>
  </div>
</body>
</html>
<!-- ═══ FIM: my-agent/marketplace-specialist/templates/login.html ═══ -->
