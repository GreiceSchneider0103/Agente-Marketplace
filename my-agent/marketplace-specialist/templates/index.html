<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Anúncios para Marketplace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Gerador de Anúncios</h1>
        <a href="{{ url_for('logout') }}" class="logout-link">Sair</a>
    </header>
    <main>
        <form id="product-form">
            <div class="form-grid">
                <!-- Coluna 1 -->
                <div class="form-column">
                    <div class="form-group">
                        <label for="nome_produto">Nome do Produto</label>
                        <input type="text" id="nome_produto" name="nome_produto" required>
                    </div>
                    <div class="form-group">
                        <label for="marca_linha">Marca / Linha</label>
                        <input type="text" id="marca_linha" name="marca_linha" required>
                    </div>
                    <div class="form-group">
                        <label for="materiais">Materiais Principais</label>
                        <input type="text" id="materiais" name="materiais" required>
                    </div>
                    <div class="form-group">
                        <label for="dimensoes">Dimensões (AxLxP cm)</label>
                        <input type="text" id="dimensoes" name="dimensoes" required>
                    </div>
                    <div class="form-group">
                        <label for="peso_suportado">Peso Suportado (kg)</label>
                        <input type="text" id="peso_suportado" name="peso_suportado" required>
                    </div>
                     <div class="form-group">
                        <label for="cores_disponiveis">Cores Disponíveis</label>
                        <input type="text" id="cores_disponiveis" name="cores_disponiveis" required>
                    </div>
                </div>

                <!-- Coluna 2 -->
                <div class="form-column">
                    <div class="form-group">
                        <label for="diferenciais_reais">Diferenciais do Produto</label>
                        <textarea id="diferenciais_reais" name="diferenciais_reais" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="garantia">Garantia</label>
                        <input type="text" id="garantia" name="garantia" required>
                    </div>
                    <div class="form-group">
                        <label for="conteudo_embalagem">Conteúdo da Embalagem</label>
                        <input type="text" id="conteudo_embalagem" name="conteudo_embalagem" required>
                    </div>
                   <div class="form-group">
                        <label for="necessita_montagem">Necessita Montagem?</label>
                        <select id="necessita_montagem" name="necessita_montagem" required>
                            <option value="não" selected>Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>
                     <div class="form-group">
                        <label for="tempo_montagem">Tempo de Montagem</label>
                        <input type="text" id="tempo_montagem" name="tempo_montagem">
                    </div>
                     <div class="form-group">
                        <label for="nivel_montagem">Nível de Montagem</label>
                        <input type="text" id="nivel_montagem" name="nivel_montagem">
                    </div>
                </div>

                <!-- Coluna 3 -->
                <div class="form-column">
                    <div class="form-group">
                        <label for="publico_alvo">Público-alvo</label>
                        <input type="text" id="publico_alvo" name="publico_alvo" required>
                    </div>
                    <div class="form-group">
                        <label for="ambientes_uso">Ambientes de Uso</label>
                        <input type="text" id="ambientes_uso" name="ambientes_uso" required>
                    </div>
                    <div class="form-group">
                        <label for="vendedor_empresa">Vendedor / Empresa</label>
                        <input type="text" id="vendedor_empresa" name="vendedor_empresa" required>
                    </div>
                    <div class="form-group">
                        <label for="marketplace_alvo">Marketplace Alvo</label>
                        <select id="marketplace_alvo" name="marketplace_alvo" required>
                            <option value="Mercado Livre" selected>Mercado Livre</option>
                            <option value="Amazon">Amazon</option>
                            <option value="Magalu">Magalu</option>
                             <option value="Google">Google</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit">Gerar Anúncio</button>
            </div>
        </form>
        
        <div id="results-container">
            <!-- Os resultados da geração aparecerão aqui -->
        </div>
    </main>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
